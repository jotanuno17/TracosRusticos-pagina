<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traços Rústicos | Carpintaria & Design</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #fdfaf6;
      --dark: #1a1612;
      --gold: #b8966e;
      --wood-dark: #3d2b1f;
      --wood-light: #8a7060;
      --text: #2a2018;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.6;
    }

    /* === HEADER === */
    header {
      background: var(--dark);
      padding: 2rem 5%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--gold);
    }

    .logo h1 {
      font-family: 'Playfair Display', serif;
      color: var(--gold); /* Cor Dourada */
      font-size: 2.5rem;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    /* Adicionado para que o subtítulo tenha a mesma cor */
    .logo span {
      display: block;
      color: var(--gold); /* Mesma cor do título e do rodapé */
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 5px;
    }

    nav {
      margin-top: 1rem;
    }

    /* === HERO SECTION === */
    .hero {
      height: 80vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                  url('FotoLoja.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: var(--white);
      padding: 0 20px;
    }

    .hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.2rem;
      max-width: 600px;
      margin-bottom: 2rem;
      font-style: italic;
    }

    /* === GALERIA / PRODUTOS === */
    .section-title {
      text-align: center;
      padding: 4rem 1rem 2rem;
    }

    .section-title h3 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--wood-dark);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      padding: 0 5% 4rem;
    }

    .card {
      background: var(--white);
      border: 1px solid #eee;
      overflow: hidden;
      transition: transform 0.3s;
      display: flex;
      flex-direction: column;
    }

    .card:hover { transform: translateY(-10px); }

    .card-img {
      height: 300px;
      background-color: #ddd;
      background-size: cover;
      background-position: center;
    }

    .card-info {
      padding: 1.5rem;
      text-align: center;
    }

    .card-info h4 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .price {
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 1rem;
      display: block;
    }

    .btn-contact {
      display: inline-block;
      padding: 0.8rem 1.5rem;
      background: var(--wood-dark);
      color: var(--white);
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 1px;
      transition: 0.3s;
    }

    .btn-contact:hover { background: var(--gold); }

    /* === FOOTER === */
    footer {
      background: var(--dark);
      color: var(--gold);
      padding: 3rem 5%;
      text-align: center;
      border-top: 2px solid var(--gold);
    }

    /* === RESPONSIVIDADE === */
    @media (max-width: 768px) {
      header { flex-direction: column; gap: 1rem; }
      nav a { margin: 0 10px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <h1>Traços Rústicos</h1>
      <span>Carpintaria & Design</span>
    </div>
    <nav>
    </nav>
  </header>

  <section class="hero">
    <h2>Artesanato com Alma</h2>
    <p>Peças únicas em madeira, desenhadas para durar gerações.</p>
    <a href="#catalogo" class="btn-contact" style="background: var(--gold)">Ver Coleção</a>
  </section>

  <section id="catalogo">
    <div class="section-title">
      <h3>O Nosso Trabalho</h3>
      <p>Cada traço, uma história contada na madeira.</p>
    </div>

    <div class="grid" id="produtos-grid">
      </div>
  </section>

  <footer id="contacto">
    <p>&copy; 2026 Traços Rústicos</p>
    <p style="margin-top: 10px; font-size: 0.8rem;">Loja 4 - Rua Cinco de Outubro Fundão  PT</p>
  </footer>

  <script>
    // Configuração dos produtos
    const produtos = [
      {
        nome: "Mesa de Carpinteiro Classic",
        preco: "Sob Consulta",
        img: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?q=80&w=500",
        fbLink: "https://www.facebook.com/profile.php?id=100013666980597"
      },
      {
        nome: "Banco Rústico em Carvalho",
        preco: "Sob Consulta",
        img: "https://images.unsplash.com/photo-1503602642458-2321112456c1?q=80&w=500",
        fbLink: "https://www.facebook.com/profile.php?id=100013666980597"
      },
      {
        nome: "Cadeira 'Traços' Ergonómica",
        preco: "Sob Consulta",
        img: "https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?q=80&w=500",
        fbLink: "https://www.facebook.com/profile.php?id=100013666980597"
      }
    ];

    function renderProdutos() {
  const grid = document.getElementById('produtos-grid');
  grid.innerHTML = produtos.map(p => `
    <div class="card">
      <div class="card-img" style="background-image: url('${p.img}')"></div>
      <div class="card-info">
        <h4>${p.nome}</h4>
        <span class="price">${p.preco}</span>
        <a href="https://www.facebook.com/profile.php?id=100013666980597" 
           target="_blank" 
           class="btn-contact">
           Perguntar no Facebook
        </a>
      </div>
    </div>
  `).join('');
}

window.onload = renderProdutos;
  </script>

</body>
</html>
